spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: tantor-server
  
  datasource:
    url: ${TANTOR_DB_URL:jdbc:postgresql://localhost:5432/tantor}
    username: ${TANTOR_DB_USER:postgres}
    password: ${TANTOR_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true
    clean-on-validation-error: false

server:
  port: 8443
  ssl:
    enabled: false
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: tantor
    client-auth: want # Allow mTLS but not strictly enforce for all paths (UI uses JWT)

tantor:
  security:
    # Keep Swagger private by default in BFSI/production environments.
    swagger-public: ${TANTOR_SWAGGER_PUBLIC:false}
    fail-on-default-secrets: ${TANTOR_FAIL_ON_DEFAULT_SECRETS:false}
    jwt:
      secret: ${TANTOR_JWT_SECRET:v2A7+S3L2Yg7d3vK7s2d1L/1mZ3v3k6/n1oP2K7bL2E=}
      expiration-ms: 86400000 # 24 hours
  artifact-repo:
    url: ${TANTOR_REPO_URL:http://localhost:8081}
  hosts:
    heartbeat-timeout-seconds: ${TANTOR_HOST_HEARTBEAT_TIMEOUT_SECONDS:90}
  # --- BFSI governance / hardening layer (V11) ---
  secrets:
    # Provider for the secrets abstraction: LOCAL_VAULT (default), HASHICORP_VAULT,
    # CYBERARK, AWS_SECRETS_MANAGER, AZURE_KEY_VAULT (external providers are interface
    # placeholders — see secrets/ExternalVaultPlaceholders.java).
    provider: ${TANTOR_SECRETS_PROVIDER:LOCAL_VAULT}
    # AES-256-GCM master key for the local encrypted vault. MUST be overridden in every
    # non-dev environment via the env var. Default is intentionally a CHANGE_ME marker.
    master-key: ${TANTOR_SECRETS_MASTER_KEY:CHANGE_ME_LOCAL_VAULT_MASTER_KEY}
  reconciliation:
    # Drift sweep interval (DB state vs. agent heartbeat / actual state). Default 5 min.
    interval-ms: ${TANTOR_RECONCILIATION_INTERVAL_MS:300000}

  agent-auth:
    # Machine-to-machine token for agent API. Must be injected from a secret manager/env var in every environment.
    # Agents send it as X-Tantor-Agent-Token. Keep enabled=true outside local development.
    enabled: ${TANTOR_AGENT_AUTH_ENABLED:true}
    token: ${TANTOR_AGENT_TOKEN:CHANGE_ME_AGENT_BOOTSTRAP_TOKEN_32_CHARS_MIN}
